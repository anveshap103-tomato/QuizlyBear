<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizzlyBearr</title>
  <link rel="stylesheet" href="./index.css" />
  <link rel="stylesheet" href="./theme.css" />
</head>
<body>

  <nav id="navbar">
    <span class="nav-title">QuizzlyBearr<span>🧸</span></span>
    <button id="darkToggle" title="Toggle dark mode">🌙</button>
  </nav>

  <div id="app">

    <div class="card" id="start">
      <div class="bear-hero">🧸</div>
      <h1>Welcome to QuizzlyBearr!</h1>
      <p>Test your knowledge — pick a category and let's go!</p>

      <div class="form-group">
        <label for="categorySelect">Category</label>
        <select id="categorySelect">
          <option value="">Loading categories...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="difficultySelect">Difficulty</label>
        <select id="difficultySelect">
          <option value="">🐻 Any Difficulty</option>
          <option value="easy">🐻 Easy</option>
          <option value="medium">🐻‍❄️ Medium</option>
          <option value="hard">🔥 Hard</option>
        </select>
      </div>

      <button class="btn btn-primary" id="startBtn">Start Quiz 🚀</button>
    </div>

    <div class="card" id="quiz">
      <div id="quiz-header">
        <span id="progress">Question 1 / 10</span>
        <span id="timer">⏱ 15s</span>
      </div>

      <div id="progress-bar-wrap">
        <div id="progress-bar" style="width:10%"></div>
      </div>

      <div id="question-card">
        <span id="bear-emoji">🐻</span>
        <p id="question"></p>
      </div>

      <div id="options"></div>

      <div id="feedback"></div>

      <div id="nav">
        <button class="btn btn-nav" id="prevBtn">⬅ Prev</button>
        <button class="btn btn-nav" id="nextBtn">Next ➡</button>
      </div>
    </div>

    <div class="card" id="result"></div>

  </div>

  <script src="./index.js"></script>
</body>
</html>
